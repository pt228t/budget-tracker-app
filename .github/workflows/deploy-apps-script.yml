name: Deploy Apps Script

on:
  push:
    branches:
      - main
    paths:
      # Only trigger when .gs files or the deploy script itself changes
      - 'scripts/apps-script/**'
      - 'scripts/deploy-apps-script.mjs'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate only, no push)'
        required: false
        default: 'false'
        type: boolean

jobs:
  deploy-apps-script:
    name: Push .gs files via clasp
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.0'
          cache: npm

      - name: Install dependencies (includes clasp)
        run: npm ci

      # Guardrail: dry-run validates all files exist and no forbidden patterns.
      - name: Validate .gs files (dry-run guardrail)
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
        run: node scripts/deploy-apps-script.mjs --dry-run

      # Write clasp credentials from secret. CLASPRC_JSON is the full
      # ~/.clasprc.json from a working local clasp login — contains refresh_token
      # so access_token auto-refreshes when expired. No manual rotation needed.
      - name: Write clasp credentials
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: echo "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Deploy to Apps Script
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
          JOINT_SPEND_SHEET_ID: ${{ secrets.JOINT_SPEND_SHEET_ID }}
        run: node scripts/deploy-apps-script.mjs

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "### ✅ Dry run complete — no files pushed" >> $GITHUB_STEP_SUMMARY
