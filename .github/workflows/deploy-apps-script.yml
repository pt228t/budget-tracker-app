name: Deploy Apps Script

on:
  push:
    branches:
      - main
    paths:
      # Only trigger when .gs files or the deploy script itself changes
      - 'scripts/apps-script/**.gs'
      - 'scripts/deploy-apps-script.mjs'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate only, no push)'
        required: false
        default: 'false'
        type: boolean

jobs:
  deploy-apps-script:
    name: Push .gs files via clasp
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (includes clasp)
        run: npm ci

      # Guardrail: dry-run validates all files exist and no forbidden patterns
      - name: Validate .gs files (dry-run guardrail)
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
        run: node scripts/deploy-apps-script.mjs --dry-run

      # Authenticate with Google using the service account JSON key.
      # The google-github-actions/auth action exchanges the key for a
      # short-lived OAuth2 access token and exposes it as GOOGLE_ACCESS_TOKEN.
      - name: Authenticate with Google (service account)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          token_format: access_token
          # Apps Script API scope required for clasp push.
          # drive (not drive.file) is needed for container-bound scripts —
          # drive.file only covers files the app itself created.
          access_token_scopes: >-
            https://www.googleapis.com/auth/script.projects
            https://www.googleapis.com/auth/drive
            https://www.googleapis.com/auth/userinfo.email
            openid

      # Pass the freshly minted access token to the deploy script.
      # This token is always valid (just generated) — no expiry risk.
      - name: Deploy to Apps Script
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
          CLASP_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: node scripts/deploy-apps-script.mjs

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "### ✅ Dry run complete — no files pushed" >> $GITHUB_STEP_SUMMARY
