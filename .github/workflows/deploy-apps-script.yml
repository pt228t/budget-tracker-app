name: Deploy Apps Script

on:
  push:
    branches:
      - main
    paths:
      # Only trigger when .gs files or the deploy script itself changes
      - 'scripts/apps-script/**'
      - 'scripts/deploy-apps-script.mjs'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate only, no push)'
        required: false
        default: 'false'
        type: boolean

jobs:
  deploy-apps-script:
    name: Push .gs files via clasp
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (includes clasp)
        run: npm ci

      # Guardrail: dry-run validates all files exist and no forbidden patterns.
      - name: Validate .gs files (dry-run guardrail)
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
        run: node scripts/deploy-apps-script.mjs --dry-run

      # Deploy using clasp with the refresh token.
      # The deploy script writes these to ~/.clasprc.json and clasp handles
      # getting a fresh access token automatically.
      - name: Deploy to Apps Script
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
          CLASP_REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
          CLASP_CLIENT_ID: ${{ secrets.CLASP_CLIENT_ID }}
          CLASP_CLIENT_SECRET: ${{ secrets.CLASP_CLIENT_SECRET }}
          JOINT_SPEND_SHEET_ID: ${{ secrets.JOINT_SPEND_SHEET_ID }}
        run: node scripts/deploy-apps-script.mjs

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "### ✅ Dry run complete — no files pushed" >> $GITHUB_STEP_SUMMARY
